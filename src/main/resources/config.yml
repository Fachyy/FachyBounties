# ==========================================
#       Configuración de FachyBounties
#         Compatibilidad: 1.13 - 1.21.x
#         Spigot, Paper, Purpur y forks
# ==========================================

settings:
  # Porcentaje de comisión del servidor (0.10 = 10%) | 0 = desactivado
  tax-rate: 0.10

  # Recompensa mínima permitida (para todos los jugadores sin rango especial)
  min-bounty: 100

  # Recompensa máxima permitida | 0 = sin límite
  max-bounty: 0

  # Tiempo de espera entre /bounty set (segundos)
  cooldown: 0

  # Ventana de combate (segundos): si la víctima muere de caída/lava/etc.
  # dentro de este tiempo tras el último golpe, el atacante cobra la recompensa
  # 0 = solo kills directos cuentan
  combat-tag-seconds: 10

  # Expiración de bounties (días) | 0 = nunca expiran
  bounty-expiry-days: 0

  # Anti-farm: horas que deben pasar para que el mismo killer pueda cobrar
  # la recompensa del mismo jugador otra vez | 0 = desactivado
  anti-farm-hours: 4

  # Tamaño del historial de kills (máximo de registros guardados)
  history-size: 50

  # Cuántas entradas mostrar en /bounty history por página
  history-page-size: 10

  # Formato de fecha en el historial (Java SimpleDateFormat)
  history-date-format: "dd/MM/yyyy HH:mm"

  # Cuántas entradas mostrar en /bounty top
  top-size: 5

# ── Mínimos por rango ──────────────────────────────────────────────────────────
# Asigna un mínimo distinto según el permiso del jugador.
# Da el permiso "fachybounties.minbounty.X" al rango correspondiente.
# El plugin usará el mínimo más alto que tenga el jugador.
# Si el jugador no tiene ninguno, usa settings.min-bounty.
# Ejemplo: VIP puede poner desde $500, Admin desde $1000
rank-min-bounty:
  500: "VIP (fachybounties.minbounty.500)"
  1000: "Admin (fachybounties.minbounty.1000)"

# ── Notificaciones ─────────────────────────────────────────────────────────────
notify:
  # Notificar al objetivo cuando alguien pone una recompensa sobre él
  on-bounty-placed: true

# ── Efectos al cobrar una recompensa ──────────────────────────────────────────
effects:
  # Rayo visual en la ubicación de la víctima (no hace daño)
  lightning: true

  # Fuegos artificiales en la ubicación de la víctima
  fireworks: false

  # Broadcast a todo el servidor
  broadcast-enabled: true

  # Mensaje privado solo al killer (además del broadcast)
  private-message-killer: true

  # Sonido al killer al cobrar la recompensa
  sound-killer-enabled: true
  # Lista de sonidos: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
  sound-killer: "ENTITY_PLAYER_LEVELUP"
  sound-killer-volume: 1.0
  sound-killer-pitch: 1.0

