# ── Menú de ayuda ─────────────────────────────────────────────────────────────
# Prefijos de permiso: [list] [set] [search] [remove] [top] [history] [admin]
# Líneas sin prefijo siempre son visibles.
help:
  - "&6&l======= FachyBounties ======="
  - "&e/bounty help &7- Muestra este menú."
  - "[list]&e/bounty list &7- Ver lista de recompensas."
  - "[set]&e/bounty set <jugador> <cantidad> &7- Poner una recompensa."
  - "[search]&e/bounty search <jugador> &7- Buscar la recompensa de alguien."
  - "[remove]&e/bounty remove <jugador> &7- Retirar tu recompensa."
  - "[top]&e/bounty top &7- Ver el top de recompensas en el chat."
  - "[history]&e/bounty history [jugador] &7- Ver historial de kills."
